<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Créer un trajet</h1>
    </div>
</div>

<div class="container">
    <form id="createTrajetForm" class="row g-3">
        <div class="col-md-6">
            <label for="TrajetDepartInput" class="form-label">Départ</label>
            <input type="text" class="form-control" id="TrajetDepartInput" required>
        </div>
        <div class="col-md-6">
            <label for="TrajetDestinationInput" class="form-label">Destination</label>
            <input type="text" class="form-control" id="TrajetDestinationInput" required>
        </div>

        <div class="col-md-6">
            <label for="TrajetDepartAtInput" class="form-label">Date et heure de départ</label>
            <input type="datetime-local" class="form-control" id="TrajetDepartAtInput" required>
        </div>
        <div class="col-md-6">
            <label for="TrajetArriveeAtInput" class="form-label">Date et heure d'arrivée</label>
            <input type="datetime-local" class="form-control" id="TrajetArriveeAtInput" required>
        </div>

        <div class="col-md-4">
            <label for="TrajetPrixInput" class="form-label">Prix</label>
            <input type="number" min="1" step="0.5" class="form-control" id="TrajetPrixInput" required>
        </div>
        <div class="col-md-4">
            <label for="TrajetPlacesInput" class="form-label">Places libres</label>
            <input type="number" min="1" max="8" class="form-control" id="TrajetPlacesInput" required>
        </div>
        <div class="col-md-4">
            <label for="TrajetVehiculeInput" class="form-label">Véhicule</label>
            <select class="form-select" id="TrajetVehiculeInput" required>
                <option value="">Choisir un véhicule</option>
            </select>
        </div>

        <div class="col-12 form-check mt-2 ms-2">
            <input class="form-check-input" type="checkbox" id="TrajetEcoInput">
            <label class="form-check-label" for="TrajetEcoInput">Trajet écologique</label>
        </div>

        <div class="col-12 text-center mt-3">
            <button type="submit" class="btn btn-success">Publier le trajet</button>
        </div>
    </form>

    <div id="createTrajetMessage" class="pt-3 text-center"></div>
</div>
