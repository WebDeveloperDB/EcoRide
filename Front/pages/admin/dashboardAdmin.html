<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Dashboard Admin</h1>
    </div>
</div>

<div class="container py-4">
    <div id="adminMessage" class="mb-3"></div>

    <div class="mb-3 text-end">
        <a class="btn btn-outline-success" href="/EcoRide/Front/admin-mongo-stats">Ouvrir la page MongoDB Stats</a>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <h2 class="h5">Statistiques</h2>
            <div id="adminStats" class="row g-2"></div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <h2 class="h5">Statistiques MongoDB (analytics)</h2>
            <div id="adminMongoStats" class="row g-2 mb-3"></div>
            <h3 class="h6">Tendances recherche par jour</h3>
            <div id="adminMongoDailySearches" class="small mb-3 text-muted"></div>
            <h3 class="h6">Usage des filtres</h3>
            <div id="adminMongoFilterUsage" class="small mb-3 text-muted"></div>
            <h3 class="h6">Dernieres recherches</h3>
            <div id="adminMongoLatestSearches" class="small mb-0 text-muted"></div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <h2 class="h5">Creer un employe (guide)</h2>
            <form id="adminCreateEmployeeForm" class="row g-2">
                <div class="col-md-4"><input class="form-control" id="adminEmployeePseudo" placeholder="Pseudo employe" required></div>
                <div class="col-md-4"><input class="form-control" id="adminEmployeeEmail" type="email" placeholder="Email employe" required></div>
                <div class="col-md-3"><input class="form-control" id="adminEmployeePassword" type="text" placeholder="Mot de passe" required></div>
                <div class="col-md-1"><button type="submit" class="btn btn-success w-100">Creer</button></div>
            </form>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <h2 class="h5">Creer un utilisateur</h2>
            <form id="adminCreateUserForm" class="row g-2">
                <div class="col-md-3"><input class="form-control" id="adminUserPseudo" placeholder="Pseudo" required></div>
                <div class="col-md-3"><input class="form-control" id="adminUserEmail" type="email" placeholder="Email" required></div>
                <div class="col-md-2"><input class="form-control" id="adminUserPassword" type="text" placeholder="Mot de passe" required></div>
                <div class="col-md-2">
                    <select id="adminUserRole" class="form-select">
                        <option value="ROLE_USER">ROLE_USER</option>
                        <option value="ROLE_EMPLOYEE">ROLE_EMPLOYEE</option>
                        <option value="ROLE_ADMIN">ROLE_ADMIN</option>
                    </select>
                </div>
                <div class="col-md-2"><button type="submit" class="btn btn-success w-100">Creer</button></div>
            </form>
            <div id="adminUsersList" class="mt-3"></div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <h2 class="h5">Vehicules</h2>
            <form id="adminCreateVehiculeForm" class="row g-2">
                <div class="col-md-2"><input class="form-control" id="adminVehiculeOwnerId" type="number" min="1" placeholder="Owner ID" required></div>
                <div class="col-md-2"><input class="form-control" id="adminVehiculeMarque" placeholder="Marque" required></div>
                <div class="col-md-2"><input class="form-control" id="adminVehiculeModele" placeholder="Modele" required></div>
                <div class="col-md-2"><input class="form-control" id="adminVehiculePlaces" type="number" min="1" placeholder="Places" required></div>
                <div class="col-md-2"><input class="form-control" id="adminVehiculeEnergie" placeholder="Energie"></div>
                <div class="col-md-2"><button type="submit" class="btn btn-success w-100">Creer</button></div>
            </form>
            <div id="adminVehiculesList" class="mt-3"></div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <h2 class="h5">Trajets</h2>
            <div id="adminTrajetsList"></div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <h2 class="h5">Avis</h2>
            <div id="adminAvisList"></div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <h2 class="h5">Participations</h2>
            <div id="adminParticipationsList"></div>
        </div>
    </div>
</div>
